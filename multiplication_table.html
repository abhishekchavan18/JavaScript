<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multiplication Table</title>
</head>
<body>
  <h2>Multiplication Table</h2>
  <div id="output"></div>

  <script>
    const output = document.getElementById("output");

    // Change this number to print different tables
    let num = 7;  

    output.innerHTML += `<p>Multiplication Table of ${num}:</p>`;
    for (let i = 1; i <= 10; i++) {
      output.innerHTML += `${num} × ${i} = ${num * i} <br>`;
    }
  </script>
</body>
</html>
